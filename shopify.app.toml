# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c8867de6e4b3b9ef48e23dedbac5bd03"
name = "Tree Master"
application_url = "https://treemaster.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_content,read_online_store_navigation,read_products,write_online_store_navigation"

[auth]
redirect_urls = [
  "https://treemaster.app/auth/callback"
]

[app_proxy]
url = "https://treemaster.app/api"
subpath = "tree-master"
prefix = "apps"
